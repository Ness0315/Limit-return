<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>復刻活動抽卡紀錄</title>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: linear-gradient(135deg, #7B5EA3, #A678D4, #D9B3F1);
  color: #ffffff;
  min-height: 100vh;
}
h2 {
  text-align: center;
  margin-bottom: 20px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}
input, select, button {
  margin: 5px;
  padding: 5px 8px;
  border-radius: 6px;
  border: none;
  outline: none;
}
button {
  background: linear-gradient(135deg, #A678D4, #D9B3F1);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
th, td {
  padding: 10px;
  text-align: center;
  color: white;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
.夏彥 { color: #FFFF00; font-weight: bold; }
.左然 { color: #FF4500; font-weight: bold; }
.莫弈 { color: #32CD32; font-weight: bold; }
.陸景和 { color: #BA55D3; font-weight: bold; }
.warning { color: #FF5555; font-weight: bold; }
.statusBox {
  margin-top: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2);
}
.hidden { display: none; }
</style>
</head>
<body>
<h2>復刻活動抽卡紀錄</h2>

<div>
  <label>活動名稱: <input type="text" id="eventName"></label>
  <label>SSR已抽: <input type="number" id="SSRDrawn" value="0"></label>
  <label>SSS已抽: <input type="number" id="SSSDrawn" value="0"></label>
  <button onclick="addEvent()">新增/更新活動</button>
</div>

<div>
  <label>選擇活動: <select id="eventSelect" onchange="loadEventData()"></select> </label>
  <button onclick="deleteEvent()">刪除活動</button>
</div>

<div style="margin-top:10px;">
  <button onclick="exportData()">📤 匯出資料</button>
  <input type="file" id="importFile">
  <button onclick="importData(false)">📥 匯入（合併）</button>
  <button onclick="importData(true)">⚠️ 匯入（覆蓋）</button>
</div>

<div class="statusBox">
  目前保底：
  <span id="SSRStatus">SSR：100</span> | 
  <span id="SSSStatus">SSS：100</span>
</div>

<div>
  <label>男主: 
    <select id="characterSelect">
      <option>夏彥</option>
      <option>左然</option>
      <option>莫弈</option>
      <option>陸景和</option>
    </select>
  </label>
  <label>稀有度: 
    <select id="raritySelect">
      <option>SSR</option>
      <option>SSS</option>
    </select>
  </label>
  <label>抽數: <input type="number" id="drawCount" value="1"></label>
  <label>活動卡: <input type="checkbox" id="isEventCard" onchange="toggleEventCardField()"></label>
  <span id="eventCardPositionField" class="hidden">
    活動卡出現在第: <input type="number" id="eventCardPosition" value="1">
  </span>
  <button onclick="addDraw()">記錄</button>
</div>

<table>
<thead>
<tr>
  <th>活動</th>
  <th>男主</th>
  <th>稀有度</th>
  <th>抽數</th>
  <th>SSR剩餘</th>
  <th>SSS剩餘</th>
  <th>活動卡抽數位置</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
let events = JSON.parse(localStorage.getItem('eventsData') || '{}');
let records = JSON.parse(localStorage.getItem('recordsData') || '[]');

function save(){
  localStorage.setItem('eventsData', JSON.stringify(events));
  localStorage.setItem('recordsData', JSON.stringify(records));
}

function updateSelect(){
  const sel = document.getElementById('eventSelect');
  sel.innerHTML = '<option value="">請選擇</option>';
  for(let e in events){
    let o = document.createElement('option');
    o.value = e;
    o.textContent = e;
    sel.appendChild(o);
  }
}

function addEvent(){
  const name = eventName.value.trim();
  if(!name) return alert('請輸入名稱');
  events[name] = {
    SSRDrawn: parseInt(SSRDrawn.value)||0,
    SSSDrawn: parseInt(SSSDrawn.value)||0
  };
  save();
  updateSelect();
}

function deleteEvent(){
  const name = eventSelect.value;
  if(!name) return;
  delete events[name];
  records = records.filter(r=>r.event!==name);
  save();
  updateSelect();
  loadEventData();
}

function calcRemain(totalDrawn){
  let remain = 100 - totalDrawn;
  if(remain < 0) remain = 0;
  return remain;
}

function updateStatus(e){
  if(!e) return;
  const data = events[e];
  let SSR = calcRemain(data.SSRDrawn);
  let SSS = calcRemain(data.SSSDrawn);
  SSRStatus.textContent = "SSR：" + SSR;
  SSSStatus.textContent = "SSS：" + SSS;
  SSRStatus.className = SSR<=10 ? "warning" : "";
  SSSStatus.className = SSS<=10 ? "warning" : "";
}

function toggleEventCardField(){
  const field = document.getElementById('eventCardPositionField');
  const checkbox = document.getElementById('isEventCard');
  field.className = checkbox.checked ? '' : 'hidden';
}

function addDraw(){
  const e = eventSelect.value;
  if(!e) return alert('選活動');
  const char = characterSelect.value;
  const rarity = raritySelect.value;
  const count = parseInt(drawCount.value);
  const isEvent = isEventCard.checked;
  let data = events[e];

  let eventPosition = '';
  if(isEvent){
    const posInput = document.getElementById('eventCardPosition').value;
    eventPosition = posInput ? parseInt(posInput) : 1;

    // 正確保底累計: 只累加活動卡發生前的抽數
    if(rarity==="SSR") data.SSRDrawn += eventPosition;
    else data.SSSDrawn += eventPosition;

  }else{
    if(rarity==="SSR") data.SSRDrawn += count;
    else data.SSSDrawn += count;
  }

  // 計算剩餘保底
  let SSRRemain = calcRemain(data.SSRDrawn);
  let SSSRemain = calcRemain(data.SSSDrawn);

  records.push({
    event:e,
    character:char,
    rarity,
    drawCount:count,
    SSRRemain,
    SSSRemain,
    eventPosition: isEvent ? eventPosition : ''
  });
  save();
  loadEventData();
}

function loadEventData(){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  const e = eventSelect.value;
  updateStatus(e);
  records.forEach((r,i)=>{
    if(e && r.event!==e) return;
    let tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.event}</td>
      <td class="${r.character}">${r.character}</td>
      <td>${r.rarity}</td>
      <td>${r.drawCount}</td>
      <td class="${r.SSRRemain<=10?'warning':''}">${r.SSRRemain}</td>
      <td class="${r.SSSRemain<=10?'warning':''}">${r.SSSRemain}</td>
      <td>${r.eventPosition}</td>
      <td><button onclick="del(${i})">刪</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function del(i){
  let r = records[i];
  let data = events[r.event];
  if(r.rarity==="SSR") data.SSRDrawn -= (r.eventPosition || r.drawCount);
  else data.SSSDrawn -= (r.eventPosition || r.drawCount);
  if(data.SSRDrawn<0) data.SSRDrawn=0;
  if(data.SSSDrawn<0) data.SSSDrawn=0;
  records.splice(i,1);
  save();
  loadEventData();
}

function exportData(){
  const data = { events, records };
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "抽卡紀錄備份.json";
  a.click();
}

function importData(overwrite){
  const file = document.getElementById('importFile').files[0];
  if(!file) return alert("請選擇檔案");
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(overwrite){
        events = data.events || {};
        records = data.records || [];
      }else{
        Object.assign(events, data.events);
        records = records.concat(data.records || []);
      }
      save();
      updateSelect();
      loadEventData();
      alert("匯入成功！");
    }catch(err){
      alert("匯入失敗！");
    }
  };
  reader.readAsText(file);
}

updateSelect();
loadEventData();
</script>
</body>
</html>
