<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>復刻活動抽卡紀錄</title>

<style>
/* ===== 動態夢幻紫粉光暈背景 + 飄動星塵 ===== */
body {
  font-family: Arial, sans-serif;
  color: white;
  padding: 20px;
  background: #1a0a2a;
  overflow: hidden;
  position: relative;
}

/* 漂浮星塵 */
body::before {
  content: "";
  position: fixed;
  top: -50%; left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.9) 1px, transparent 1px) repeat;
  background-size: 40px 40px;
  animation: floatStars 80s linear infinite;
  opacity: 0.35;
  pointer-events: none;
  z-index: -1;
}

/* 漸層紫粉光暈 */
body::after {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: linear-gradient(120deg, #6a0dad, #ff69b4, #c471f5, #ffb6c1, #6a0dad);
  background-size: 500% 500%;
  animation: gradientMove 25s ease infinite;
  opacity: 0.6;
  z-index: -2;
  pointer-events: none;
}

/* 閃爍小星星 */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle 3s infinite alternate;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes floatStars {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-25%, -25%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

@keyframes twinkle {
  0% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.5); }
}

/* ===== 原本容器 & 元素樣式 ===== */
h2 { text-align:center; }

.container{
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius:15px;
  padding:15px;
}

input,select,button{
  margin:5px;
  padding:6px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff7aa2;
  color:white;
  cursor:pointer;
}
button:hover{ background:#ff4d88; }

table{
  width:100%;
  margin-top:20px;
  border-collapse: collapse;
}

th,td{
  padding:10px;
  text-align:center;
  background: rgba(255,255,255,0.1);
  border-radius:5px;
}

.夏彥 { color: #FFFF00; font-weight:bold; }
.左然 { color: #FF4500; font-weight:bold; }
.莫弈 { color: #32CD32; font-weight:bold; }
.陸景和 { color: #BA55D3; font-weight:bold; }

.statusBox { margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.2); border-radius:10px; }
.warning { color: red; font-weight:bold; }
</style>
</head>

<body>

<h2>復刻活動抽卡紀錄</h2>

<div class="container">

<!-- 活動管理 -->
<div>
<label>活動名稱: <input type="text" id="eventName"></label>
<label>SSR已抽: <input type="number" id="SSRDrawn" value="0"></label>
<label>SSS已抽: <input type="number" id="SSSDrawn" value="0"></label>
<button onclick="addEvent()">新增/更新活動</button>
</div>

<div>
<label>選擇活動: <select id="eventSelect" onchange="loadEventData()"></select> </label>
<button onclick="deleteEvent()">刪除活動</button>
</div>

<!-- 匯出/匯入 -->
<div style="margin-top:10px;">
<button onclick="exportData()">📤 匯出資料</button>
<input type="file" id="importFile">
<button onclick="importData(false)">📥 匯入（合併）</button>
<button onclick="importData(true)">⚠️ 匯入（覆蓋）</button>
</div>

<!-- 保底顯示 -->
<div class="statusBox">
目前保底： <span id="SSRStatus">SSR：100</span> | <span id="SSSStatus">SSS：100</span>
</div>

<!-- 抽卡 -->
<div>
<label>男主: <select id="characterSelect">
<option>夏彥</option>
<option>左然</option>
<option>莫弈</option>
<option>陸景和</option>
</select></label>

<label>稀有度: <select id="raritySelect">
<option>SSR</option>
<option>SSS</option>
</select></label>

<label>抽數: <input type="number" id="drawCount" value="1"></label>

<label>是否活動卡: <select id="isEventSelect" onchange="toggleHitInput()">
<option>否</option>
<option>是</option>
</select></label>

<span id="hitArea" style="display:none;">
第幾抽中：<input type="number" id="hit" value="1" min="1">
</span>

<button onclick="addDraw()">記錄</button>
</div>

<!-- 抽卡紀錄表格 -->
<table>
<thead>
<tr>
<th>活動</th>
<th>男主</th>
<th>稀有度</th>
<th>抽數</th>
<th>SSR剩餘</th>
<th>SSS剩餘</th>
<th>是否活動卡</th>
<th>第幾抽中</th>
<th>操作</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>
// JS 原邏輯保持不變
let events = JSON.parse(localStorage.getItem('eventsData') || '{}');
let records = JSON.parse(localStorage.getItem('recordsData') || '[]');

function save(){
  localStorage.setItem('eventsData', JSON.stringify(events));
  localStorage.setItem('recordsData', JSON.stringify(records));
}

function updateSelect(){
  const sel = document.getElementById('eventSelect');
  sel.innerHTML = '<option value="">請選擇</option>';
  for(let e in events){
    let o = document.createElement('option');
    o.value = e;
    o.textContent = e;
    sel.appendChild(o);
  }
}

// 新增/更新活動
function addEvent(){
  const name = eventName.value.trim();
  if(!name) return alert('請輸入名稱');
  events[name] = {
    SSRDrawn: parseInt(SSRDrawn.value)||0,
    SSSDrawn: parseInt(SSSDrawn.value)||0
  };
  save();
  updateSelect();
}

// 刪除活動
function deleteEvent(){
  const name = eventSelect.value;
  if(!name) return;
  delete events[name];
  records = records.filter(r=>r.event!==name);
  save();
  updateSelect();
  loadEventData();
}

// 保底計算
function calcRemain(drawn){
  let remain = 100 - drawn;
  if(remain < 0) remain = 0;
  return remain;
}

// 顯示保底
function updateStatus(e){
  if(!e) return;
  const data = events[e];
  let SSR = calcRemain(data.SSRDrawn);
  let SSS = calcRemain(data.SSSDrawn);
  SSRStatus.textContent = "SSR：" + SSR;
  SSSStatus.textContent = "SSS：" + SSS;
  SSRStatus.className = SSR<=10 ? "warning" : "";
  SSSStatus.className = SSS<=10 ? "warning" : "";
}

// 切換是否活動卡動態欄位
function toggleHitInput() {
  const hitArea = document.getElementById("hitArea");
  const isEventSelect = document.getElementById("isEventSelect");
  hitArea.style.display = isEventSelect.value === "是" ? "inline" : "none";
}

// 記錄抽卡
function addDraw(){
  const e = eventSelect.value;
  if(!e) return alert('請選活動');
  const char = characterSelect.value;
  const rarity = raritySelect.value;
  const count = parseInt(drawCount.value);
  const isEvent = (document.getElementById("isEventSelect").value === "是");
  const hitNum = isEvent ? parseInt(document.getElementById("hit").value) : null;
  let data = events[e];
  if(rarity === "SSR"){
    if(isEvent){
      const actualHit = hitNum || count;
      data.SSRDrawn = 0;
      data.SSRDrawn += (count - actualHit);
    } else {
      data.SSRDrawn += count;
    }
  } else {
    if(isEvent){
      const actualHit = hitNum || count;
      data.SSSDrawn = 0;
      data.SSSDrawn += (count - actualHit);
    } else {
      data.SSSDrawn += count;
    }
  }
  let SSRRemain = calcRemain(data.SSRDrawn);
  let SSSRemain = calcRemain(data.SSSDrawn);
  records.push({
    event:e,
    character:char,
    rarity,
    drawCount:count,
    SSRRemain,
    SSSRemain,
    isEvent,
    hit: hitNum
  });
  save();
  loadEventData();
}

// 載入資料
function loadEventData(){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  const e = eventSelect.value;
  updateStatus(e);
  records.forEach((r,i)=>{
    if(e && r.event!==e) return;
    let tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.event}</td>
      <td class="${r.character}">${r.character}</td>
      <td>${r.rarity}</td>
      <td>${r.drawCount}</td>
      <td class="${r.SSRRemain<=10?'warning':''}">${r.SSRRemain}</td>
      <td class="${r.SSSRemain<=10?'warning':''}">${r.SSSRemain}</td>
      <td>${r.isEvent?'是':'否'}</td>
      <td>${r.hit || ''}</td>
      <td><button onclick="del(${i})">刪</button></td>
    `;
    tbody.appendChild(tr);
  });
}

// 刪除紀錄
function del(i){
  let r = records[i];
  let data = events[r.event];
  if(r.rarity==="SSR") data.SSRDrawn -= r.drawCount;
  else data.SSSDrawn -= r.drawCount;
  if(data.SSRDrawn<0) data.SSRDrawn=0;
  if(data.SSSDrawn<0) data.SSSDrawn=0;
  records.splice(i,1);
  save();
  loadEventData();
}

// 匯出
function exportData(){
  const data = { events, records };
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "抽卡紀錄備份.json";
  a.click();
}

// 匯入
function importData(overwrite=false){
  const file = document.getElementById('importFile').files[0];
  if(!file) return alert("請選擇檔案");
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(overwrite){
        events = data.events || {};
        records = data.records || [];
      }else{
        Object.assign(events, data.events);
        records = records.concat(data.records || []);
      }
      save();
      updateSelect();
      loadEventData();
      alert("匯入成功！");
    }catch(err){
      alert("匯入失敗！");
    }
  };
  reader.readAsText(file);
}

// ⭐ 加入小星星
for(let i=0;i<50;i++){
  let s = document.createElement("div");
  s.className="star";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration= (2+Math.random()*3) + "s";
  document.body.appendChild(s);
}

updateSelect();
loadEventData();
</script>

</body>
</html>
